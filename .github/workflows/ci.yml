# CI — runs on every push + PR. Must stay green.
#
# Mirrors the Makefile's `make ci` target so devs can reproduce
# locally exactly what CI runs. If CI fails on a check that passes
# locally, the Makefile target is wrong (fix that, not CI).
#
# Discipline scaffold reference implementation. The same workflow
# template ships with `codevira discipline install` in v2.2,
# language-tuned per project.

name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: make lint

      - name: Unit tests (G1)
        run: make test-unit

      - name: First-contact e2e (G2)
        run: make test-e2e

  type-check:
    name: Type-check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -e ".[dev]"
      - run: make type-check
