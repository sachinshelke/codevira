[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "codevira-mcp"
version = "1.0.0"
description = "Persistent memory and project context for AI coding agents — MCP server with context graph, semantic search, roadmap, and session logging."
readme = "README.md"
license = { text = "MIT" }
authors = [
  { name = "Sachin Shelke", email = "sachin.worldnet@gmail.com" }
]
requires-python = ">=3.10"
keywords = [
  "mcp",
  "model-context-protocol",
  "ai-agents",
  "llm",
  "developer-tools",
  "claude",
  "cursor",
  "windsurf",
  "code-intelligence",
  "semantic-search",
  "context-graph",
  "chromadb",
  "agentic",
  "coding-assistant",
  "knowledge-graph"
]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
  "Topic :: Software Development :: Build Tools",
]
dependencies = [
  "chromadb>=0.5.0",
  "sentence-transformers>=2.7.0",
  "pyyaml>=6.0",
  "mcp>=1.0.0",
  "gitpython>=3.1.0",
  "watchdog>=3.0.0",
]

[project.scripts]
codevira-mcp = "mcp_server.server:main"

[project.urls]
Homepage = "https://github.com/sachinshelke/codevira"
Repository = "https://github.com/sachinshelke/codevira"
Issues = "https://github.com/sachinshelke/codevira/issues"
Changelog = "https://github.com/sachinshelke/codevira/blob/main/CHANGELOG.md"

[tool.setuptools.packages.find]
where = ["."]
include = ["mcp_server*", "indexer*"]
